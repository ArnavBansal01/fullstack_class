<!doctype html>
<html>
  <head>
    <title>Post Job</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <center>
      <h1>Post a Job</h1>
      <p>Fill details to post job vacancy</p>
    </center>

    <hr />

    <form id="jobForm">
      <h3 style="justify-content: center; display: flex">Company Info</h3>

      <input type="text" id="company" placeholder="Company Name" />
      <br /><br />

      <hr />
      <h3 style="justify-content: center; display: flex">Job Details</h3>

      <label for="details">Job Title</label><br />
      <input type="text" id="details" />
      <br /><br />

      Job Category<br />
      <select id="category">
        <option value="">Select</option>
        <option value="IT">IT</option>
        <option value="Marketing">Marketing</option>
        <option value="HR">HR</option>
      </select>
      <br /><br />

      Job Type<br />
      <select id="jobType">
        <option value="">Select</option>
        <option value="Onsite">Onsite</option>
        <option value="Remote">Remote</option>
      </select>
      <br /><br />

      Experience Required<br />
      <input type="text" id="experience" placeholder="Like 0-2 years" />
      <br /><br />

      Salary Range<br />
      <input type="number" id="minSalary" placeholder="Min" />
      <input type="number" id="maxSalary" placeholder="Max" />
      <br /><br />

      <hr />

      <h3 style="justify-content: center; display: flex">Job Description</h3>

      Write Job Description<br />
      <textarea id="description" rows="5" cols="50"></textarea>
      <br /><br />

      <hr />

      <h3 style="justify-content: center; display: flex">Apply Details</h3>

      Last Date to Apply<br />
      <input type="date" id="deadline" />
      <br /><br />

      Email to Receive Application<br />
      <input type="email" id="email" />
      <br /><br />

      <hr />

      <button type="submit" style="margin-top: 12px">Post Job</button>
      <button type="reset" style="margin-top: 12px">Reset</button>
    </form>

    <hr />
<hr />

<h3 style="text-align:center;">Search Jobs</h3>

<input type="text" id="searchInput" placeholder="Search by title or company" />
<button id="searchBtn">Search</button>

<hr />
    
    <div id="jobList"></div>

    <script src="post.js"></script>
  </body>
</html>
